<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <title>Authentication - HackMate</title>
  <link href="/src/css/style.css" rel="stylesheet" />
  <style>
    /* State of the Art Auth Theme */
    body {
      margin: 0;
      background-color: #f8fafc;
      background-image: radial-gradient(#e2e8f0 0.8px, transparent 0.8px);
      background-size: 24px 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(241, 245, 249, 0.5);
      border-radius: 32px;
      padding: 56px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      z-index: 10;
      text-align: center;
      animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .auth-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3);
      transform: rotate(-4deg);
    }

    h1 {
      font-size: 32px;
      font-weight: 900;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    p.auth-subtitle {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      color: #64748b;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      background: #f8fafc;
      border: 1.5px solid #f1f5f9;
      border-radius: 16px;
      padding: 14px 20px;
      color: #1e293b;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-group input:focus {
      background: white;
      border-color: #4f46e5;
      outline: none;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .auth-submit-btn {
      width: 100%;
      padding: 16px;
      background: #0f172a;
      border: none;
      border-radius: 16px;
      color: #ffffff;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .auth-submit-btn:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .auth-submit-btn:active {
      transform: scale(0.98);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 32px 0;
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #f1f5f9;
    }

    .divider span {
      margin: 0 20px;
    }

    .social-btn {
      width: 100%;
      padding: 14px;
      background: #ffffff;
      border: 1.5px solid #f1f5f9;
      border-radius: 16px;
      color: #475569;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: #f8fafc;
      border-color: #e2e8f0;
      transform: translateY(-1px);
    }

    .toggle-link {
      margin-top: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
    }

    .toggle-link a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 800;
    }

    #phone-auth-container {
      margin-top: 24px;
      padding: 24px;
      background: #f8fafc;
      border-radius: 20px;
      border: 1px solid #f1f5f9;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="w-20 h-20 mx-auto mb-8 flex items-center justify-center transition-transform hover:scale-110 duration-500">
      <img src="/logo.jpeg" alt="HackMate Logo" class="w-full h-full object-contain" />
    </div>

    <h1 id="auth-title">Sign In to Your Account</h1>
    <p id="auth-subtitle" class="auth-subtitle">
      Join the HackMate community. Find your next teammate and start building amazing projects together.
    </p>

    <div class="social-buttons">
      <button id="google-btn" type="button" class="social-btn">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>
      <button id="phone-toggle-btn" type="button" class="social-btn">
        <i data-lucide="phone" class="w-5 h-5 text-gray-500"></i>
        Continue with Phone
      </button>
    </div>

    <div class="divider"><span>Or</span></div>

    <form id="auth-form">
      <div id="name-field" class="input-group" style="display: none;">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="John Doe" />
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input id="email" type="email" required placeholder="you@example.com" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" required placeholder="••••••••" />
      </div>

      <div id="confirm-field" class="input-group" style="display: none;">
        <label>Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="••••••••" />
      </div>

      <button id="auth-submit" type="submit" class="auth-submit-btn">log In</button>
    </form>

    <!-- Phone Auth Container -->
    <div id="phone-auth-container" class="hidden">
      <div id="phone-step-1">
        <div class="input-group">
          <label>Phone Number</label>
          <input id="phone-input" type="tel" placeholder="+91 9876543210" />
        </div>
        <div id="recaptcha-container"></div>
        <button id="send-code-btn" type="button" class="auth-submit-btn"
          style="background: #f3f4f6; color: #374151; border: 1px solid #d1d5db;">Send Verification Code</button>
      </div>
      <div id="phone-step-2" class="hidden">
        <div class="input-group">
          <label>Verification Code</label>
          <input id="code-input" type="text" placeholder="123456" maxlength="6" />
        </div>
        <button id="verify-code-btn" type="button" class="auth-submit-btn">Verify & Sign In</button>
      </div>
    </div>

    <div class="toggle-link">
      <span id="auth-toggle-text">New to HackMate? </span>
      <a id="auth-toggle-link" href="?mode=signup">Create an account</a>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { initUI } from "/src/js/ui.js";
    import { initAuthUI } from "/src/js/auth.js";

    // Initialize UI with navbar hidden (true)
    initUI(true);
    initAuthUI();

    // Custom dynamic UI logic to handle mode switching
    const urlParams = new URLSearchParams(window.location.search);
    const isSignup = urlParams.get('mode') === 'signup';
    const title = document.getElementById('auth-title');
    const subtitle = document.getElementById('auth-subtitle');
    const toggleLink = document.getElementById('auth-toggle-link');
    const toggleText = document.getElementById('auth-toggle-text');
    const submitBtn = document.getElementById('auth-submit');

    if (isSignup) {
      title.textContent = "Create an Account";
      subtitle.textContent = "Enter your details to create your HackMate profile and start matching.";
      toggleText.textContent = "Already have an account? ";
      toggleLink.textContent = "Log In";
      toggleLink.href = "?mode=login";
      submitBtn.textContent = "Sign Up";
    } else {
      title.textContent = "Log In to Your Account";
      subtitle.textContent = "Welcome back to HackMate. Enter your credentials to access your dashboard.";
      toggleText.textContent = "New to HackMate? ";
      toggleLink.textContent = "Sign Up";
      toggleLink.href = "?mode=signup";
      submitBtn.textContent = "Log In";
    }
  </script>
</body>

</html>
