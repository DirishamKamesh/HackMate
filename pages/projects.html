<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - HackMate</title>
    <link href="/src/css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-background text-dark font-body antialiased">
    <div id="navbar-container"></div>

    <div class="flex-grow flex">
      <div id="sidebar-container"></div>

      <main class="flex-grow w-full overflow-y-auto h-[calc(100vh-4rem)]">
        <div class="p-6 max-w-7xl mx-auto w-full">
          <div
            class="flex flex-col sm:flex-row sm:items-center justify-between mb-8"
          >
            <div>
              <h1 class="text-2xl font-bold font-heading text-dark">
                Project Showcase
              </h1>
              <p class="text-gray-600">
                Discover inspiring projects built by the community.
              </p>
            </div>

            <div class="mt-4 sm:mt-0">
              <button id="open-upload-modal" class="btn-primary">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Submit Project
              </button>
            </div>
          </div>

          <!-- Modal -->
          <div
            id="upload-modal"
            class="fixed inset-0 z-[100] hidden bg-gray-900 bg-opacity-50 flex items-center justify-center p-4"
          >
            <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-6">
              <h2 class="text-xl font-bold font-heading mb-4">
                Submit a Project
              </h2>
              <form id="project-form" class="space-y-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700"
                    >Project Title</label
                  >
                  <input
                    type="text"
                    id="proj-title"
                    required
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700"
                    >Description</label
                  >
                  <textarea
                    id="proj-desc"
                    required
                    rows="3"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg"
                  ></textarea>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1"
                    >Project Screenshot</label
                  >

                  <!-- Drag and Drop Zone -->
                  <div
                    id="drop-zone"
                    class="border-2 border-dashed border-gray-300 rounded-lg h-32 flex flex-col items-center justify-center text-center cursor-pointer hover:border-primary hover:bg-indigo-50 transition-colors relative overflow-hidden group"
                  >
                    <!-- Preview Image -->
                    <img
                      id="image-preview"
                      src=""
                      alt="Preview"
                      class="hidden w-full h-full object-cover absolute inset-0 z-10"
                    />

                    <!-- Overlay if image exists -->
                    <div
                      id="image-overlay"
                      class="hidden absolute inset-0 bg-black bg-opacity-50 z-10 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                    >
                      <p class="text-white text-sm font-medium">
                        Click to replace
                      </p>
                    </div>

                    <div id="drop-zone-content" class="relative z-0">
                      <i
                        data-lucide="upload-cloud"
                        class="w-8 h-8 text-gray-400 mx-auto mb-2"
                      ></i>
                      <p class="text-sm text-gray-500 font-medium">
                        Click or drag image here
                      </p>
                      <p class="text-xs text-gray-400 mt-1">
                        JPEG, PNG up to 5MB
                      </p>
                    </div>

                    <!-- Hidden File Input -->
                    <input
                      type="file"
                      id="proj-image"
                      accept="image/jpeg, image/png"
                      class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"
                    />
                  </div>
                </div>

                <!-- Progress Tracker -->
                <div id="progress-container" class="hidden space-y-1">
                  <div
                    class="flex justify-between text-xs font-medium text-gray-500"
                  >
                    <span id="progress-status">Uploading image...</span>
                    <span id="progress-text">0%</span>
                  </div>
                  <div class="w-full bg-gray-100 rounded-full h-2">
                    <div
                      id="progress-bar"
                      class="bg-primary h-2 rounded-full transition-all duration-300"
                      style="width: 0%"
                    ></div>
                  </div>
                </div>

                <div
                  class="flex justify-end space-x-3 pt-4 border-t border-gray-100"
                >
                  <button type="button" id="close-modal" class="btn-outline">
                    Cancel
                  </button>
                  <button type="submit" id="proj-submit" class="btn-primary">
                    Publish Project
                  </button>
                </div>
              </form>
            </div>
          </div>

          <!-- Projects Grid -->
          <div
            id="projects-grid"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
          >
            <div class="col-span-full py-12 text-center text-gray-500">
              Loading projects...
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script type="module">
      import { initUI } from "/src/js/ui.js";
      import { requireAuth } from "/src/js/auth.js";
      import { setupProjects } from "/src/js/projects.js";
      import { auth } from "/src/js/firebase.js";
      import { onAuthStateChanged } from "firebase/auth";

      initUI();
      requireAuth();
      onAuthStateChanged(auth, (user) => {
        if (user) setupProjects(user);
      });
    </script>
  </body>
</html>
